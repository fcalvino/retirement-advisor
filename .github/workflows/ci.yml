name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check . --output-format=github

      - name: Run tests
        env:
          # Tests run without real API keys — mocks handle all network calls
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          AI_ENABLED: "false"
          CACHE_TTL_HOURS: "1"
        run: pytest tests/ -v --tb=short
